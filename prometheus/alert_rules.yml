groups:
  - name: backend_alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "The backend service has been unreachable for more than 30 seconds."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes. Current value: {{ $value | humanizePercentage }}"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency"
          description: "95th percentile latency is above 2 seconds. Current value: {{ $value }}s"

      - alert: HighCPUUsage
        expr: |
          (
            sum(rate(container_cpu_usage_seconds_total{name=~".+"}[5m])) by (name)
            /
            sum(container_spec_cpu_quota{name=~".+"} / container_spec_cpu_period{name=~".+"}) by (name)
          ) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on container {{ $labels.name }}"
          description: "Container {{ $labels.name }} CPU usage is above 80%."
